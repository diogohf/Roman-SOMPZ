som_deep_informer_big:
  output_mode: default
  redshift_col: &id013 specz
  hdf5_groupname: None
  nproc: 128
  inputs: &id002
  - flux_pgauss_LSST_u
  - flux_pgauss_LSST_g
  - flux_pgauss_LSST_r
  - flux_pgauss_LSST_i
  - flux_pgauss_LSST_z
  - flux_pgauss_LSST_y 
  - flux_pgauss_Y
  - flux_pgauss_J
  - flux_pgauss_H
  input_errs: &id003
  - flux_err_pgauss_LSST_u
