  - flux_err_pgauss_LSST_r
  - flux_err_pgauss_LSST_i
  - flux_err_pgauss_LSST_z
  - flux_err_pgauss_LSST_y 
  - flux_err_pgauss_Y
  - flux_err_pgauss_J
  - flux_err_pgauss_H
  zero_points: &id004
  - 22.5
  - 22.5
  - 22.5
  - 22.5
  - 22.5
  - 22.5
  - 22.5
  - 22.5
  - 22.5  
